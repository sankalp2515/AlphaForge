name: CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Build & Push Docker Image ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Smoke Tests ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Pull and run API
        run: |
          docker pull ${{ needs.build-and-push.outputs.image-tag }}
          docker run -d \
            --name alphaforge-api \
            -p 8000:8000 \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e ENVIRONMENT=staging \
            -e ALPHAFORGE_DB_URL=sqlite:///test.db \
            -e MLFLOW_TRACKING_URI=sqlite:///mlflow.db \
            ${{ needs.build-and-push.outputs.image-tag }}

      - name: Wait for API to start
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            sleep 2
          done

      - name: Run smoke tests
        run: |
          # Health check
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Expected healthy, got {data}'
          print('✅ Health check passed')
          "

          # Metrics endpoint
          curl -sf http://localhost:8000/metrics | grep -q "alphaforge_predict_requests_total"
          echo "✅ Prometheus metrics endpoint working"

          # Model info endpoint
          curl -sf http://localhost:8000/model/info
          echo "✅ Model info endpoint working"

      - name: Cleanup
        if: always()
        run: docker stop alphaforge-api || true

  # ─── Deploy Notification ─────────────────────────────────────────────────────
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-test]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ needs.build-and-push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests:** ${{ needs.smoke-test.result }}" >> $GITHUB_STEP_SUMMARY
