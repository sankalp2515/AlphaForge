global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'alphaforge'

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'alphaforge-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescaledb:5432']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
