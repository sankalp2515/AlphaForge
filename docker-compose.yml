# AlphaForge — Minimal Infrastructure
# Only runs services that MUST be containerized (databases, cache).
# Everything else (Airflow, API, training) runs as plain Python processes.
# Memory footprint: ~1.5GB vs 15GB for full stack.
#
# Start:  docker compose up -d
# Stop:   docker compose down

services:
  # ─── TimescaleDB ────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: alphaforge-timescaledb
    environment:
      POSTGRES_USER: alphaforge
      POSTGRES_PASSWORD: alphaforge
      POSTGRES_DB: alphaforge
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alphaforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MLflow ─────────────────────────────────────────────────────────────────
  # Uses SQLite backend so it starts instantly with zero extra services.
  # For production, swap backend-store-uri to PostgreSQL.
  mlflow:
    image: python:3.11-slim
    container_name: alphaforge-mlflow
    command: >
      bash -c "pip install --quiet mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:////mlflow/mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  timescale-data:
  redis-data:
  mlflow-data:
